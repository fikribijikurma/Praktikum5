<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5">
<div class="container">
    <h3>MY Website 20210140019</h3>
    <p>Selamat datang di aplikasi!</p>
    <a th:href="@{/form}" class="text-primary text-decoration-none">+ Input Data Mahasiswa</a>

    <h5 class="mt-4">Data Mahasiswa</h5>
    <table class="table table-bordered border-primary mt-2">
        <thead class="table-primary text-center">
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${listMhs.empty}">
            <td colspan="4" class="text-center">Belum ada data</td>
        </tr>
        <tr th:each="mhs, iter : ${listMhs}">
            <td th:text="${iter.count}" class="text-center"></td>
            <td th:text="${mhs.nama}"></td>
            <td th:text="${mhs.nim}"></td>
            <td th:text="${mhs.jenisKelamin}"></td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/logout}" class="text-primary text-decoration-none">Logout</a>
</div>
</body>
</html>
