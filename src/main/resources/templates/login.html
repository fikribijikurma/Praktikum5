<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Bali Heritage Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@400;600&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bali-gold: #d4af37;
            --bali-red: #8b0000;
            --bali-black: #0f0f0f;
            --bali-grey: #1a1a1a;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bali-black);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(139, 0, 0, 0.15) 0%, transparent 80%),
                url("https://www.transparenttextures.com/patterns/black-linen.png");
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .login-card {
            background: var(--bali-grey);
            border: 2px solid var(--bali-gold);
            border-radius: 4px;
            padding: 3.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1), inset 0 0 15px rgba(139, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: "";
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            pointer-events: none;
        }

        .bali-header {
            font-family: 'Playfair Display', serif;
            color: var(--bali-gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .logo-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            border: 2px solid var(--bali-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            transform: rotate(45deg);
        }

        .logo-container i {
            transform: rotate(-45deg);
            font-size: 2rem;
            color: var(--bali-gold);
        }

        .form-label {
            color: var(--bali-gold);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
        }

        .form-control {
            background: #252525;
            border: 1px solid #333;
            border-radius: 0;
            color: #fff;
            padding: 0.8rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: #2a2a2a;
            border-color: var(--bali-gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            color: #fff;
        }

        .btn-bali {
            background: linear-gradient(135deg, var(--bali-red) 0%, #5d0000 100%);
            border: 1px solid var(--bali-gold);
            color: var(--bali-gold);
            border-radius: 0;
            padding: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
        }

        .btn-bali:hover {
            background: var(--bali-gold);
            color: var(--bali-black);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        .form-text {
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
        }

        .bali-accent {
            text-align: center;
            margin-top: 2rem;
            opacity: 0.5;
        }

        .bali-accent img {
            width: 100px;
            filter: sepia(1) saturate(5) hue-rotate(10deg);
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="logo-container">
            <i class="bi bi-bank2"></i>
        </div>
        <h2 class="bali-header">Admin Portal</h2>
        
        <div th:if="${error}" class="alert alert-danger bg-transparent border-danger text-danger py-2 small mb-4" th:text="${error}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-4 text-start">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="username" required>
            </div>
            <div class="mb-5 text-start">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                <div class="form-text mt-2">
                    <i class="bi bi-key-fill text-gold me-1"></i> Gunakan Admin sebagai password.
                </div>
            </div>
            <button type="submit" class="btn btn-bali w-100">Sign In</button>
        </form>

        <div class="bali-accent">
            <i class="bi bi-flower1" style="color: var(--bali-gold); font-size: 1.5rem;"></i>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
